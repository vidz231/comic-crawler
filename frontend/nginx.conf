server {
    listen 80;
    server_name _;
    resolver 127.0.0.11 ipv6=off valid=10s;
    set $api_upstream api:8000;

    # ── Root: serve the React SPA ─────────────────────────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/javascript application/json
        application/xml+rss image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;

    # ── CRITICAL: Service worker & manifest must NEVER be cached ─────────────
    # Mobile browsers respect Cache-Control headers strictly. If sw.js is
    # cached with immutable/1y, the browser will never fetch the new version
    # and the PWA will stay stuck on the old build forever.
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        try_files $uri =404;
    }

    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Content-Type "application/manifest+json";
        try_files $uri =404;
    }

    # version.json — build hash file polled by the frontend to detect new deploys
    location = /version.json {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        try_files $uri =404;
    }

    # Workbox runtime JS (sits at root, not in /assets/) — must not be cached
    location ~* ^/workbox-[a-f0-9]+\.js$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        try_files $uri =404;
    }

    # Cache-Control for static assets (hashed filenames — safe to cache long)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── API proxy → backend container ─────────────────────────────────────────
    location /api/ {
        proxy_pass         http://$api_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeouts — crawler requests can be slow
        proxy_read_timeout    120s;
        proxy_connect_timeout  10s;
        proxy_send_timeout     60s;
    }

    # ── Public web liveness endpoint ──────────────────────────────────────────
    location = /livez {
        access_log off;
        default_type application/json;
        return 200 '{"status":"ok","service":"comic-crawler-web"}';
    }

    # ── Backend readiness endpoint ────────────────────────────────────────────
    location = /health {
        proxy_pass         http://$api_upstream/health;
        proxy_http_version 1.1;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Docs proxy (optional — expose FastAPI Swagger in production) ──────────
    location = /docs/ {
        return 308 /docs;
    }

    location /docs {
        proxy_pass         http://$api_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location = /openapi.json {
        proxy_pass         http://$api_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── SPA fallback ──────────────────────────────────────────────────────────
    # All other requests are served as index.html so React Router handles them.
    # index.html must never be cached — it references the current hashed bundle.
    location / {
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /index.html;
    }
}
