<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1a1040"/>
      <stop offset="100%" stop-color="#080810"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="pageLeft" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="pageRight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <!-- Glow blob -->
  <ellipse cx="256" cy="240" rx="180" ry="140" fill="url(#glow)"/>

  <!-- Open book spine -->
  <rect x="248" y="155" width="16" height="230" rx="8" fill="#a78bfa" opacity="0.9"/>

  <!-- Left page -->
  <path d="M248 165 Q180 170 140 190 L135 360 Q175 345 248 345 Z"
        fill="url(#pageLeft)" opacity="0.95"/>
  <!-- Left page lines -->
  <line x1="158" y1="220" x2="232" y2="215" stroke="#fff" stroke-width="6" stroke-linecap="round" opacity="0.3"/>
  <line x1="155" y1="248" x2="230" y2="243" stroke="#fff" stroke-width="6" stroke-linecap="round" opacity="0.3"/>
  <line x1="152" y1="276" x2="228" y2="271" stroke="#fff" stroke-width="6" stroke-linecap="round" opacity="0.3"/>
  <line x1="150" y1="304" x2="226" y2="299" stroke="#fff" stroke-width="6" stroke-linecap="round" opacity="0.3"/>

  <!-- Right page -->
  <path d="M264 165 Q332 170 372 190 L377 360 Q337 345 264 345 Z"
        fill="url(#pageRight)" opacity="0.95"/>
  <!-- Right page lines -->
  <line x1="354" y1="220" x2="280" y2="215" stroke="#fff" stroke-width="6" stroke-linecap="round" opacity="0.3"/>
  <line x1="357" y1="248" x2="282" y2="243" stroke="#fff" stroke-width="6" stroke-linecap="round" opacity="0.3"/>
  <line x1="360" y1="276" x2="284" y2="271" stroke="#fff" stroke-width="6" stroke-linecap="round" opacity="0.3"/>
  <line x1="362" y1="304" x2="286" y2="299" stroke="#fff" stroke-width="6" stroke-linecap="round" opacity="0.3"/>

  <!-- Glowing spine highlight -->
  <rect x="250" y="155" width="12" height="230" rx="6" fill="#e9d5ff" opacity="0.5"/>
</svg>
